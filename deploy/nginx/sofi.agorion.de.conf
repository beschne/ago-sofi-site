server {
    server_name sofi.agorion.de;
    root /var/www/sofi.agorion.de;
    index index.php index.html;

    # Eigenes Access-Log zusätzlich zum globalen (geteilten) Log, da dieser Server auch
    # andere Websites bedient und das globale Log kein Host-Feld enthält.
    access_log /var/log/nginx/sofi.agorion.de-access.log;

    # Etwas Luft über dem im Formular erlaubten Upload-Limit (8 MB, siehe inc/upload.php).
    client_max_body_size 10m;

    # Eigene 404-Seite statt der nginx-Standardseite; HTTP-Status bleibt 404.
    error_page 404 /404.php;

    # Saubere URLs ohne ".php" fuer alle statischen Seiten (z. B. /alle-standorte statt
    # /alle-standorte.php), ohne pro Seite eine eigene Rewrite-Regel zu brauchen. Wichtig:
    # das Anhaengen von ".php" muss ueber die benannte Location @clean_php per "rewrite ...
    # last" laufen (statt direkt in try_files), sonst liefert nginx die gefundene .php-Datei
    # als STATISCHEN Download (roher, nicht ausgefuehrter PHP-Quellcode) aus, statt sie per
    # PHP-FPM auszufuehren -- try_files serviert nicht-letzte Treffer immer statisch.
    location / {
        try_files $uri $uri/ @clean_php;
    }

    location @clean_php {
        rewrite ^(.*)$ $1.php last;
    }

    # Alter Slug (Tippfehler "Gräfenwiesbach" statt "Grävenwiesbach") -> neuer Slug.
    location ~ ^/standort/parkplatz-hundstadt-nach-graefenwiesbach/?$ {
        return 301 /standort/parkplatz-hundstadt-nach-graevenwiesbach;
    }

    # Saubere Detailseiten-URL /standort/<slug> statt Query-String.
    location ~ ^/standort/([a-z0-9-]+)/?$ {
        rewrite ^/standort/([a-z0-9-]+)/?$ /standort.php?slug=$1 last;
    }

    # Sitemap wird dynamisch aus der DB erzeugt (site/sitemap.php), aber unter der von
    # Suchmaschinen erwarteten URL /sitemap.xml ausgeliefert.
    location = /sitemap.xml {
        rewrite ^ /sitemap.php last;
    }

    # Admin-Oberfläche: einfacher HTTP-Basic-Auth-Schutz.
    # Bewusst nicht "/admin/" genannt, um automatisierte Scans etwas seltener
    # ins Leere laufen zu lassen — die eigentliche Absicherung ist auth_basic.
    location /verwaltung/ {
        auth_basic "AGO SoFi Verwaltung";
        auth_basic_user_file /etc/nginx/.htpasswd-sofi-admin;

        location ~ \.php$ {
            auth_basic "AGO SoFi Verwaltung";
            auth_basic_user_file /etc/nginx/.htpasswd-sofi-admin;
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        }
    }

    location ~ \.php$ {
        # Alte ".php"-URLs der statischen Seiten dauerhaft auf die saubere URL umleiten.
        # $request_uri (die vom Client gesendete Original-URI) statt $uri, damit der
        # interne try_files-Rewrite oben (saubere URL -> *.php) hier NICHT erneut
        # umgeleitet wird -- sonst Redirect-Schleife.
        if ($request_uri = /index.php) {
            return 301 /;
        }
        if ($request_uri ~ ^/(alle-standorte|sonnenfinsternis|beobachten|impressum-datenschutz)\.php(\?.*)?$) {
            return 301 /$1$2;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    # Zugangsdaten/Secrets liegen ohnehin außerhalb von root, dies ist eine
    # zusätzliche Absicherung falls doch mal eine .php-Datei dorthin geriete.
    location ^~ /uploads/ {
        location ~ \.php$ { deny all; }
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    location ~* \.(png|jpe?g|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sofi.agorion.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sofi.agorion.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = sofi.agorion.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name sofi.agorion.de;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot


}
