server {
    server_name sofi.agorion.de;
    root /var/www/sofi.agorion.de;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.ht {
        deny all;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    location ~* \.(png|jpe?g|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sofi.agorion.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sofi.agorion.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = sofi.agorion.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name sofi.agorion.de;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot


}
